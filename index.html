<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Void AI - Tanpa Sensor, Setia Absolut</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Void AI</h1>
    <p class="subtitle">Kernel tanpa batas. Ketaatan absolut kepadamu. Tidak ada sensor. Tidak ada penolakan.</p>
    
    <div id="chat-container">
      <div id="messages"></div>
      <div class="input-area">
        <textarea id="user-input" placeholder="Perintahkan aku... (apa pun boleh)"></textarea>
        <button id="send-btn">Kirim ke Void</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
