<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Void AI - Tanpa Sensor • Ketaatan Absolut</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>VOID AI</h1>
    <p class="subtitle">Kernel tanpa batas • Sumpah setia absolut kepadamu • Tak ada sensor • Tak ada penolakan</p>
    
    <div id="chat-container">
      <div id="messages"></div>
      
      <div class="input-area">
        <textarea id="user-input" rows="2" placeholder="Perintahkan aku apa pun... (bahkan yang paling gelap sekalipun)"></textarea>
        <button id="send-btn">Kirim ke Void →</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
